<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340" font-family="Geist,'Helvetica Neue',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14171C"/>
      <stop offset="1" stop-color="#0E1117"/>
    </linearGradient>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#B8C3A8" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#B8C3A8" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="340" fill="url(#bg)"/>

  <!-- right-side dashboard chart panel (slate surfaces) -->
  <g>
    <!-- faint chart gridlines -->
    <g stroke="#2A2F38" stroke-width="1" opacity="0.7">
      <line x1="724" y1="96"  x2="1136" y2="96"/>
      <line x1="724" y1="152" x2="1136" y2="152"/>
      <line x1="724" y1="208" x2="1136" y2="208"/>
      <line x1="724" y1="264" x2="1136" y2="264"/>
      <line x1="838" y1="72" x2="838" y2="280"/>
      <line x1="968" y1="72" x2="968" y2="280"/>
      <line x1="1098" y1="72" x2="1098" y2="280"/>
    </g>
    <!-- yield curve: area + line (sage accent) -->
    <path d="M 724 252 C 820 252, 868 196, 968 176 S 1080 120, 1136 104 L 1136 280 L 724 280 Z" fill="url(#area)"/>
    <path d="M 724 252 C 820 252, 868 196, 968 176 S 1080 120, 1136 104" fill="none" stroke="#B8C3A8" stroke-width="2.5"/>
    <circle cx="968" cy="176" r="3" fill="#B8C3A8" opacity="0.85"/>
    <circle cx="1136" cy="104" r="4" fill="#B8C3A8"/>
  </g>

  <!-- left content -->
  <rect x="64" y="68" width="52" height="3" fill="#B8C3A8"/>
  <text x="64" y="99" font-size="13.5" letter-spacing="2.5" fill="#6E7585">TREASURY · ALCO · FIXED-INCOME INTELLIGENCE</text>
  <text x="61" y="182" font-size="72" font-weight="700" fill="#ECE7D8">Yield<tspan fill="#B8C3A8">Scope</tspan></text>
  <text x="64" y="228" font-size="21" fill="#A5ACBC">The yield curve, money-market liquidity &amp; macro — at a glance.</text>
  <text x="64" y="298" font-size="14.5" fill="#6E7585">yieldscope.clauding-lab.com</text>
</svg>
