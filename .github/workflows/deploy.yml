name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Run the v3/v4 JS actions on Node 24 (GitHub forces this 2026-06-16; this is
    # the official bridge until the action major versions are bumped).
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Vite bakes VITE_* env vars into the static bundle at build time.
      # VITE_SUPABASE_URL is public (same project The Brief uses).
      # VITE_SUPABASE_ANON_KEY is RLS-scoped read-only — sourced from a GitHub Secret.
      # Without these, the production bundle falls back to fixture data.
      - name: Build
        env:
          VITE_SUPABASE_URL: https://ssbliukchgibjcjohibi.supabase.co
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
