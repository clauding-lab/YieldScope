name: Update the App

on:
  workflow_dispatch:
    inputs:
      skip_scrape:
        description: 'Skip auction scraping (data-only update)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # ── Step 1: Scrape live auction data from BB website ──
      - name: Scrape T-Bill auctions
        if: inputs.skip_scrape != 'true'
        run: node scripts/scrape-tbill.mjs

      - name: Scrape T-Bond auctions
        if: inputs.skip_scrape != 'true'
        run: node scripts/scrape-tbond.mjs

      - name: Scrape BB circulars
        if: inputs.skip_scrape != 'true'
        run: node scripts/scrape-circulars.mjs

      # ── Step 2: Update yield curve from auction data ──
      - name: Update yield curve
        run: node scripts/update-yield-curve.mjs

      # ── Step 3: Refresh ALL data files via AI ──
      - name: Update all data (macro, fiscal, policy, commodities, etc.)
        run: node scripts/update-all-data.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # ── Step 4: Update banking sector data (monthly) ──
      - name: Update banking data
        run: node scripts/update-banking-data.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # ── Step 5: Generate all AI analysis ──
      - name: Generate AI analysis (autopsy, commentary, curve, ALCO brief)
        run: node scripts/generate-ai-analysis.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # ── Step 6: Build to verify nothing is broken ──
      - name: Build app
        run: npm run build

      # ── Step 7: Commit and push ──
      - name: Commit and deploy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/*.json
          git diff --cached --quiet || git commit -m "data: full app update — all data & AI analysis [automated]"
          git push
